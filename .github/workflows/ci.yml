# =============================================================
# DevSecOps CI Pipeline — Java Monolith (BankApp)
# Tool: GitHub Actions
# Stack: Maven 3.9 · Java 21 · SonarQube · Trivy · Nexus · Docker Hub · GHCR
# Reference copy: github.com/ibtisam-iq/devsecops-pipelines
#                 pipelines/java-monolith/github-actions/ci.yml
# Mirrors:        pipelines/java-monolith/jenkins/Jenkinsfile (14 stages)
# =============================================================
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   DOCKER_USERNAME       — Docker Hub username
#   DOCKER_PASSWORD       — Docker Hub PAT (read/write/delete)
#   NEXUS_USERNAME        — Nexus admin username
#   NEXUS_PASSWORD        — Nexus admin password
#   SONAR_TOKEN           — SonarQube user token
#   SONAR_HOST_URL        — https://sonar.ibtisam-iq.com
#   GIT_TOKEN             — GitHub PAT with repo scope (for CD repo update)
#   MAVEN_SETTINGS_XML    — Full contents of your settings.xml (Nexus credentials embedded)
#
# NOTE: GITHUB_TOKEN is automatically provided by GitHub Actions — no secret needed for GHCR login.
# =============================================================

name: DevSecOps CI — Java Monolith

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'        # ci.yml-only post-merge changes don't need a full pipeline run
      - 'Jenkinsfile'
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  pull_request:
    branches: [main]
    # NOTE: .github/** is intentionally NOT excluded here.
    # A PR that only modifies ci.yml must still trigger CI so the workflow
    # change is validated before merge. Excluding .github/** from pull_request
    # paths-ignore would cause workflow-change PRs to merge blind with no
    # pipeline validation — the exact opposite of what PRs are for.
    paths-ignore:
      - 'Jenkinsfile'
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  workflow_dispatch:

# Minimal top-level permissions — every job declares only what it needs
permissions:
  contents: read

# Cancel in-progress runs for the same branch/ref.
#
# FIX R4#6: cancel-in-progress is scoped to pull_request builds only.
# cancel-in-progress: true on push-to-main is dangerous: a second push landing
# while the first run is mid-registry-push (Stages 11-13) would cancel it after
# some layers are uploaded but before the manifest is committed — leaving a
# corrupt or missing :latest tag in Docker Hub, GHCR, and Nexus.
# PR builds have no write side-effects (no push to registries, no CD update)
# so cancellation is safe and desirable there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # ── App metadata
  # APP_VERSION is intentionally NOT set here — it is extracted dynamically
  # from pom.xml in the versioning step to avoid manual drift.
  APP_NAME: java-monolith

  # ── Docker Hub
  IMAGE_NAME: mibtisam/java-monolith

  # ── GHCR
  GHCR_IMAGE: ghcr.io/ibtisam-iq/java-monolith

  # ── Nexus Docker (path-based routing — no dedicated port needed)
  NEXUS_DOCKER:      nexus.ibtisam-iq.com
  NEXUS_DOCKER_REPO: docker-hosted

  # ── App lives at repo root (no submodule path needed)
  APP_DIR: .

  # ── Java / Maven
  JAVA_VERSION: '21'
  # CI-only JVM flags: -XX:TieredStopAtLevel=1 disables the C2 JIT compiler,
  # trading peak runtime performance for faster startup/compilation in CI.
  # Do NOT use these flags in production JVM configuration.
  MAVEN_OPTS: >-
    -Xmx1g
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1

  # ── Application server port
  # FIX R4#4: Promoted from hardcoded build-arg to a named env var.
  # 8000 is the port this application is configured to listen on (set in
  # application.properties / application.yml). Change here if the app port
  # changes — this is the single source of truth for the build-arg passed
  # to Docker at build time.
  APP_PORT: '8000'

  # ── CD GitOps handoff (Stage 14)
  # FIX R4#10: CD repo coordinates promoted from hardcoded shell to named
  # env vars. Update here if the CD repo is renamed or the manifest path
  # changes — no need to hunt through the Stage 14 shell script.
  CD_REPO:          ibtisam-iq/platform-engineering-systems
  CD_MANIFEST_PATH: systems/java-monolith/image.env

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB — CI: Build, Test, Scan & Push (14 stages)
  # ════════════════════════════════════════════════════════════
  ci:
    name: CI — Build, Test & Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents:      read        # checkout (Stage 1)
                                 # NOTE: Stage 14 writes to the CD repo via GIT_TOKEN PAT.
                                 # PAT permissions are independent of GITHUB_TOKEN — do NOT
                                 # elevate this to contents: write to fix a Stage 14 push error.
                                 # If Stage 14 fails with permission denied, check GIT_TOKEN scope.
      packages:      write       # push to GHCR (Stages 8, 12)
      pull-requests: write       # SonarQube PR decoration (Stage 5)
      checks:        write       # JUnit test reporter (Stage 4)

    outputs:
      image_tag: ${{ steps.versioning.outputs.image_tag }}

    steps:

      # ──────────────────────────────────────────────────────
      # STAGE 1 — Checkout
      # fetch-depth: 0 required for SonarQube blame info.
      # Mirrors Jenkins: checkout([$class:'GitSCM'])
      # ──────────────────────────────────────────────────────
      - name: Checkout — source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────
      # STAGE 2 — Trivy Filesystem Scan
      # Runs BEFORE build — scan source + pom.xml for secrets,
      # misconfigs, and known CVEs in declared dependencies.
      # Two passes: CRITICAL (warn only) + HIGH/MEDIUM (warn only).
      # exit-code: '0' on both passes — filesystem scan is advisory;
      # the hard security gate is on the built image (Stage 10, Pass B).
      # This matches the Jenkinsfile Stage 2 posture: both pipelines treat
      # FS scan as informational and enforce the hard gate on the image.
      # See docs/trivy-troubleshooting.md for full rationale.
      # ──────────────────────────────────────────────────────
      - name: Trivy — filesystem scan (CRITICAL → warn only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref:  ${{ env.APP_DIR }}
          scanners:  secret,vuln,misconfig
          severity:  CRITICAL
          exit-code: '0'
          format:    json
          output:    trivy-fs-report.json

      - name: Trivy — filesystem scan (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref:  ${{ env.APP_DIR }}
          scanners:  secret,vuln,misconfig
          severity:  HIGH,MEDIUM
          exit-code: '0'
          format:    table

      # FIX R4#11: hashFiles guard — skip upload if the scan step errored
      # before writing the file (avoids a confusing zero-byte artifact).
      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-fs-report.json') != ''
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # Set up Java 21 + Maven dependency cache
      #
      # Moved BEFORE the Versioning step (previous round fix).
      # The versioning step runs `mvn help:evaluate` which requires the
      # temurin-21 JDK installed here — not the runner's default JDK.
      # ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ──────────────────────────────────────────────────────
      # STAGE 3 — Versioning
      # APP_VERSION is read from pom.xml at runtime so the image tag
      # always matches the artifact version without manual sync.
      # Format: <pom-version>-<short-sha>-<run-number>
      # e.g.   0.0.1-SNAPSHOT-ab3f12c-42
      #
      # TWO outputs written deliberately:
      #   $GITHUB_OUTPUT  → steps.versioning.outputs.image_tag
      #                     Safe for ${{ }} expressions in later steps.
      #   $GITHUB_ENV     → IMAGE_TAG bash variable
      #                     Available to run: shell blocks from the NEXT step onward.
      #
      # NEVER use ${{ env.IMAGE_TAG }} for runtime-computed values —
      # the workflow-level env: block is parsed BEFORE any step runs,
      # so IMAGE_TAG would always resolve to empty string there.
      #
      # FIX R4#3: --short=7 pins the SHA abbreviation to exactly 7 characters.
      # Without an explicit length, Git uses the minimum chars needed for
      # uniqueness in the current repo — typically 7 today but silently grows
      # to 8+ as the repo accumulates commits, changing the tag format over time.
      # ──────────────────────────────────────────────────────
      - name: Versioning — compute image tag
        id: versioning
        run: |
          APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_TAG="${APP_VERSION}-${SHORT_SHA}-${{ github.run_number }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      # ──────────────────────────────────────────────────────
      # Configure Maven settings (Nexus credentials)
      # env: block + printf '%s' pattern — safe injection of XML secrets.
      # See detailed explanation in git history / previous commits.
      # ──────────────────────────────────────────────────────
      - name: Configure Maven settings (Nexus credentials)
        env:
          MAVEN_SETTINGS: ${{ secrets.MAVEN_SETTINGS_XML }}
        run: |
          mkdir -p ~/.m2
          printf '%s' "$MAVEN_SETTINGS" > ~/.m2/settings.xml

      # ──────────────────────────────────────────────────────
      # STAGE 4 — Build & Test
      # mvn clean verify: compile → test → JaCoCo → package
      # The build step itself fails on test failure (Surefire exits non-zero).
      # The JUnit reporter below runs with if: always() as a reporting step
      # AFTER the build — fail_on_failure: false prevents a redundant double
      # failure signal from the reporter on top of the already-failed build.
      # ──────────────────────────────────────────────────────
      - name: Build & Test — mvn clean verify
        run: mvn clean verify -B --no-transfer-progress

      - name: Publish JUnit test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths:    'target/surefire-reports/*.xml'
          check_name:      JUnit Test Results
          fail_on_failure: false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 5 — SonarQube Analysis
      # -Dsonar.working.directory pins report-task.txt to workspace root
      # so the Quality Gate action (Stage 6) can always find it.
      # ──────────────────────────────────────────────────────
      - name: SonarQube — static analysis
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=IbtisamIQbankapp \
            -Dsonar.projectName=IbtisamIQbankapp \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.working.directory="${GITHUB_WORKSPACE}/.scannerwork" \
            -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 6 — Quality Gate
      # scanMetadataReportFile must match -Dsonar.working.directory above.
      # Both this step and Stage 5 run in the same job on the same runner,
      # so ${GITHUB_WORKSPACE} (shell) and ${{ github.workspace }} (expression)
      # resolve to the same absolute path — no cross-job mismatch risk.
      #
      # SHA-pinned to v1.2.0 — same supply-chain rationale as Trivy.
      # A semver tag can be force-pushed to a malicious commit; a SHA is immutable.
      #
      # timeout-minutes: 5 is a GitHub Actions STEP-LEVEL timeout — it kills
      # the step (not just the SonarQube poll) after 5 minutes. This is
      # intentional for BankApp: SonarQube analysis on this small codebase
      # completes in under 2 minutes in practice. If you scale to a larger
      # project where analysis takes longer, increase this value accordingly.
      # A timeout here surfaces as "step timed out", not "quality gate failed".
      # ──────────────────────────────────────────────────────
      - name: SonarQube — Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ github.workspace }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ──────────────────────────────────────────────────────
      # STAGE 7 — Publish JAR to Nexus
      # Guarded to main push only — prevents unmerged PR branch SNAPSHOTs
      # from polluting the Nexus snapshot repository.
      # Implicitly depends on Quality Gate (Stage 6) passing: GHA prepends
      # success() to any custom if: condition, so if Stage 6 fails or times
      # out, this step is skipped automatically.
      # ──────────────────────────────────────────────────────
      - name: Publish JAR to Nexus
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 7b — Upload JAR to GitHub Actions Artifacts
      # Runs on main push only (same guard as Stage 7 / Nexus publish).
      # The JAR is produced by mvn clean verify (Stage 4) and lives at
      # target/*.jar. retention-days: 14 keeps artifact costs manageable.
      # ──────────────────────────────────────────────────────
      - name: Upload JAR — GitHub Actions artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: java-monolith-${{ steps.versioning.outputs.image_tag }}
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 8 — Registry Logins (BEFORE build)
      # All three registry logins happen here so that the image
      # tag resolution and daemon availability are guaranteed
      # before docker build runs in the next step.
      #
      # NOTE: Logins are intentionally NOT gated to main-only.
      # On PR builds, the login is required to pull cached layers
      # from the registry for the BuildKit cache (cache-from: type=gha).
      # Without login, authenticated cache pulls fail silently and the
      # build falls back to a cold cache — significantly slower.
      # ──────────────────────────────────────────────────────
      - name: Docker Hub — login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: GHCR — login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nexus — login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      # ──────────────────────────────────────────────────────
      # STAGE 9 — Docker Build
      # load: true  → image loaded into local daemon for Trivy scan (Stage 10)
      # push: false → push happens AFTER Trivy passes (Stages 11-13), main only
      #
      # CONSTRAINT: load: true is INCOMPATIBLE with multi-platform builds.
      # If you ever add `platforms: linux/amd64,linux/arm64`, Docker Buildx
      # cannot load a multi-platform manifest into the local daemon and will
      # error out. To enable multi-arch, you must either:
      #   (a) build → push directly (remove load: true, set push: true), or
      #   (b) build amd64 only for the scan, then rebuild multi-arch for push.
      # Current setup: single-platform amd64 only — load: true works correctly.
      #
      # NOTE: Build is intentionally NOT gated to main-only — PR builds must
      # build + scan the image (Stages 9-10) to catch CVEs before merge.
      # Only the push steps (Stages 11-13) are gated to main.
      #
      # SERVER_PORT build-arg: uses APP_PORT from the top-level env: block.
      # See env: block comment for why 8000 (matches application.properties).
      #
      # image.created label: uses head_commit.timestamp (push events) with
      # fallback to run_started_at (workflow_dispatch and other trigger types
      # where head_commit is null). Both are RFC 3339 timestamps per OCI spec.
      # ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build — build image (load into daemon for scan + push)
        uses: docker/build-push-action@v6
        with:
          context:  ${{ env.APP_DIR }}
          push:     false
          load:     true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest
          build-args: |
            SERVER_PORT=${{ env.APP_PORT }}
          labels: |
            org.opencontainers.image.version=${{ steps.versioning.outputs.image_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.run_started_at }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ──────────────────────────────────────────────────────
      # STAGE 10 — Trivy Image Scan
      # Three passes — full rationale in docs/trivy-troubleshooting.md.
      # Summary:
      #   Pass A — OS packages (vendor's responsibility) → warn only
      #   Pass B — Library/JAR CVEs (your pom.xml)      → CRITICAL fails build
      #   Pass C — Full report (all types + severities)  → audit artifact only
      #
      # Trivy image scan resolves tags against the local Docker daemon first
      # (via Docker socket). Since Stage 9 uses load: true, the image is
      # present locally under the exact tags specified — Trivy scans the
      # just-built image, not any previously pushed remote version.
      #
      # Pass B has no if: always() — intentional. If Stage 9 (Docker build)
      # fails, there is no image to scan; running trivy image against a
      # non-existent image produces a misleading "image not found" error on
      # top of the real build failure. Pass A cannot fail (exit-code: 0),
      # so Pass B always runs when Stage 9 succeeds.
      # ──────────────────────────────────────────────────────

      # Pass A — OS packages: warn only (Canonical/vendor's responsibility)
      - name: Trivy — image scan OS packages (CRITICAL → warn only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: os
          severity:  CRITICAL,HIGH
          exit-code: '0'
          format:    table

      # Pass B — Library (JAR) CRITICALs: FAIL the build
      # These are YOUR dependencies in pom.xml. Fix = bump version.
      # No if: always() — intentional. See Stage 10 header comment above.
      - name: Trivy — image scan JAR/library (CRITICAL → fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: library
          severity:  CRITICAL
          exit-code: '1'
          format:    table

      # Pass B (cont.) — Library HIGH/MEDIUM: warn only
      - name: Trivy — image scan JAR/library (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: library
          severity:  HIGH,MEDIUM
          exit-code: '0'
          format:    table

      # Pass C — Full report for audit trail (all vuln-types, all severities)
      - name: Trivy — image scan full report (audit artifact)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          severity:  CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'
          format:    json
          output:    trivy-image-report.json

      - name: Upload Trivy image report (audit artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 11 — Push to Docker Hub
      #
      # WHY bare $IMAGE_TAG and NOT ${{ env.IMAGE_TAG }}:
      # IMAGE_TAG is a runtime-computed value written to $GITHUB_ENV by the
      # versioning step. The ${{ env.IMAGE_TAG }} expression context is parsed
      # BEFORE any step runs — it would always resolve to empty string here.
      # Bare $IMAGE_TAG reads from the bash environment (populated from
      # $GITHUB_ENV at step start) and correctly gets the versioning output.
      # Static env vars like IMAGE_NAME (set in the top-level env: block) are
      # safe to use with ${{ env.* }} because they are known at parse time.
      #
      # Guarded to main push only — images must not be pushed to any registry
      # on pull_request builds. Build + scan (Stages 9-10) run on PRs to catch
      # CVEs before merge; publishing does not.
      # ──────────────────────────────────────────────────────
      - name: Docker Hub — push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker push ${{ env.IMAGE_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 12 — Push to GitHub Container Registry (GHCR)
      # (Same $IMAGE_TAG rationale and main-only guard as Stage 11.)
      # ──────────────────────────────────────────────────────
      - name: GHCR — push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.GHCR_IMAGE }}:$IMAGE_TAG
          docker push ${{ env.GHCR_IMAGE }}:latest

      # ───────────────────────────────────────────────═──────
      # STAGE 13 — Push to Nexus Docker Registry
      # (Same $IMAGE_TAG rationale and main-only guard as Stage 11.)
      # ───────────────────────────────────────────────═──────
      - name: Nexus — push image (path-based routing)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 13b — Push to AWS ECR  [PLANNED — commented out]
      # ──────────────────────────────────────────────────────
      # - name: AWS ECR — login
      #   uses: aws-actions/amazon-ecr-login@v2
      # - name: AWS ECR — tag and push
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   run: |
      #     ECR_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
      #     docker tag ${{ env.IMAGE_NAME }}:$IMAGE_TAG  "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker tag ${{ env.IMAGE_NAME }}:latest      "${ECR_IMAGE}:latest"
      #     docker push "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker push "${ECR_IMAGE}:latest"

      # ──────────────────────────────────────────────────────
      # STAGE 14 — Update CD Repo (GitOps handoff)
      # Runs only on push to main AND only if all prior steps succeeded
      # (success() is the implicit default when no status function is given).
      # This is intentional: the CD repo must only be updated when the full
      # pipeline passes — not on PR builds or partial failures.
      #
      # CD_REPO and CD_MANIFEST_PATH from top-level env: block — update
      # configuration there, not here in the shell.
      #
      # FIX R4#2: Token kept off process argv.
      #   Pattern: clone public URL → set-url with token → push.
      #   `git clone https://x-access-token:${TOKEN}@...` embeds the token
      #   in argv, visible to ps/proc scanners for the duration of the clone.
      #   Setting the authenticated URL after clone via `git remote set-url`
      #   never puts the token in a process argument — it writes to .git/config
      #   (in-memory, not exposed to ps). After push, the token is cleared from
      #   the remote URL so it is not present in the workspace at cleanup time.
      #
      # git diff --cached --quiet + push inside commit arm: push only runs
      #   when a commit was actually made (previous round fix).
      # git config --local: identity scoped to this repo only (previous round).
      # git push origin HEAD: branch-rename resilient (previous round).
      # ──────────────────────────────────────────────────────
      - name: Update CD repo — GitOps image tag handoff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          # FIX R4#2: Clone with public URL — token never in process argv
          git clone https://github.com/${CD_REPO}.git cd-repo
          cd cd-repo

          # Set authenticated remote after clone — writes to .git/config, not argv
          git remote set-url origin https://x-access-token:${GIT_TOKEN}@github.com/${CD_REPO}.git

          git config --local user.email "github-actions@ibtisam-iq.com"
          git config --local user.name  "GitHub Actions CI"

          mkdir -p "$(dirname "${CD_MANIFEST_PATH}")"

          # Once K8s/Helm manifests exist, replace with:
          # sed -i "s|image: mibtisam/java-monolith:.*|image: mibtisam/java-monolith:${IMAGE_TAG}|g" \
          #     deployments/java-monolith/deployment.yaml

          echo "=== Current manifest ==="
          cat ${CD_MANIFEST_PATH} 2>/dev/null || echo "(file does not exist yet)"

          echo "=== Writing new manifest ==="
          cat > ${CD_MANIFEST_PATH} << EOF
          IMAGE_TAG=${IMAGE_TAG}
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          UPDATED_BY=github-actions-run-${{ github.run_number }}
          GIT_COMMIT=${{ github.sha }}
          GIT_BRANCH=${{ github.ref_name }}
          EOF

          git add "${CD_MANIFEST_PATH}"

          git diff --cached --quiet \
            && echo "ℹ️  Nothing to commit — image tag unchanged" \
            || { git commit -m "ci: update java-monolith image tag to ${IMAGE_TAG} [skip ci]" && git push origin HEAD; }

          # Clear token from remote URL after push — token not left in workspace
          git remote set-url origin https://github.com/${CD_REPO}.git

      # ──────────────────────────────────────────────────────
      # Cleanup — remove local Docker images
      # (Same $IMAGE_TAG rationale as Stage 11 — see comment above.)
      # ──────────────────────────────────────────────────────
      - name: Cleanup — remove local Docker images
        if: always()
        run: |
          docker rmi ${{ env.IMAGE_NAME }}:$IMAGE_TAG                                                             || true
          docker rmi ${{ env.IMAGE_NAME }}:latest                                                                 || true
          docker rmi ${{ env.GHCR_IMAGE }}:$IMAGE_TAG                                                            || true
          docker rmi ${{ env.GHCR_IMAGE }}:latest                                                                 || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG         || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest             || true

      # ──────────────────────────────────────────────────────
      # Cleanup — remove cloned CD repo (if Stage 14 ran)
      # Separated from image cleanup — these are different concerns.
      # rm -rf on a non-existent path exits 0 — safe as a no-op on PR builds.
      # ──────────────────────────────────────────────────────
      - name: Cleanup — remove cloned CD repo workspace
        if: always()
        run: rm -rf cd-repo
