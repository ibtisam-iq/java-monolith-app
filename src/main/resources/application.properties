# Application Name
spring.application.name=${SPRING_APPLICATION_NAME}

# Database Connection Properties
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA) Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# SQL Init
spring.sql.init.mode=always

# Actuator: exposes /actuator/health for Docker/K8s health checks
management.endpoints.web.exposure.include=health

# Server Port
server.port=${SERVER_PORT}

# =============================================================================
# ALB HTTPS FIX — resolves infinite login redirect loop
# =============================================================================
# CONTEXT:
# The app sits behind an AWS ALB that terminates SSL. The ALB forwards plain
# HTTP to the app on port 8000. Without the settings below, three separate
# issues combine to cause an infinite redirect loop on login.
#
# FIX 1 — Trust forwarded headers from ALB
# The ALB sets X-Forwarded-Proto: https on every request. This tells Spring
# the original scheme was HTTPS so it generates https:// redirects instead
# of http:// ones. Without this, Spring redirects to http://, the browser
# upgrades to https://, session is lost, loop repeats.
server.forward-headers-strategy=native
#
# FIX 2 — Mark session cookie as Secure
# Browsers only send Secure cookies over HTTPS connections. Without this
# flag the session cookie is dropped on HTTPS requests and Spring Security
# sees no session, treating every request as unauthenticated.
server.servlet.session.cookie.secure=true
#
# FIX 3 — Set SameSite=Lax on session cookie
# Modern browsers block cookies without an explicit SameSite attribute.
# Lax allows the cookie on top-level navigations and form POSTs (login)
# while still protecting against CSRF from third-party contexts.
server.servlet.session.cookie.same-site=lax
